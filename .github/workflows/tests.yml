name: API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  playwright-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test
        env:
          QIWI_TOKEN: ${{ secrets.QIWI_TOKEN }}
          QIWI_WALLET: ${{ secrets.QIWI_WALLET }}
          QIWI_RECIPIENT: ${{ secrets.QIWI_RECIPIENT }}

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main' && success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report

  postman-tests:
    name: Postman Collection (Newman)
    runs-on: ubuntu-latest
    needs: playwright-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Postman collection
        run: >
          npx newman run
          postman/qiwi-wallet-api-tests.postman_collection.json
          --environment postman/qiwi-wallet-api-tests.postman_environment.json
          --reporters cli,json
          --reporter-json-export newman-results.json
          --timeout-request 30000
          --ignore-redirects
        env:
          QIWI_TOKEN: ${{ secrets.QIWI_TOKEN }}

      - name: Upload Newman results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: newman-results.json
          retention-days: 30
